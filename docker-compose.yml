name: healthcare

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - "postgres"
      - "-c"
      - "max_connections=150"
    volumes:
      - healthcare_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00_base.sql
      - ./services/patient-data/infra/init_tables.sql:/docker-entrypoint-initdb.d/01_patient_data.sql
      - ./services/patient-event-reconciliation/infra/init_tables.sql:/docker-entrypoint-initdb.d/02_reconciliation.sql
      - ./services/patient-timeline/infra/init_tables.sql:/docker-entrypoint-initdb.d/03_timeline.sql
      - ./services/patient-summary/infra/init_tables.sql:/docker-entrypoint-initdb.d/04_patient_summary.sql
      - ./services/npi-registry/infra/init_tables.sql:/docker-entrypoint-initdb.d/05_npi_registry.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthcare"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - healthcare-service-network

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"   # monitoring
    command: ["--http_port", "8222", "--jetstream"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - healthcare-service-network

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  ingestion-gateway:
    build:
      context: .
      dockerfile: services/ingestion-gateway/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      NATS_URL: nats://nats:4222
    ports:
      - "8001:8001"
      - "5679:5678"  # debugpy
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - healthcare-service-network

  patient-data:
    build:
      context: .
      dockerfile: services/patient-data/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      NATS_URL: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthcare
      POSTGRES_READER_USER: hs_reader
      POSTGRES_READER_PASSWORD: hs_reader
      POSTGRES_WRITER_USER: hs_writer
      POSTGRES_WRITER_PASSWORD: hs_writer
      POSTGRES_POOL_MIN_SIZE: 2
      POSTGRES_POOL_MAX_SIZE: 5
    ports:
      - "8002:8002"
      - "5680:5678"  # debugpy
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - healthcare-service-network

  patient-event-reconciliation:
    build:
      context: .
      dockerfile: services/patient-event-reconciliation/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      INCLUDE_DEBUG: debugpy
      WORKER_ID: reconciliation-service-1
      NATS_URL: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthcare
      POSTGRES_READER_USER: hs_reader
      POSTGRES_READER_PASSWORD: hs_reader
      POSTGRES_WRITER_USER: hs_writer
      POSTGRES_WRITER_PASSWORD: hs_writer
      POSTGRES_POOL_MIN_SIZE: 2
      POSTGRES_POOL_MAX_SIZE: 5
    ports:
      - "8003:8003"
      - "5681:5678"  # debugpy
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - healthcare-service-network

  patient-timeline:
    build:
      context: .
      dockerfile: services/patient-timeline/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      NATS_URL: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthcare
      POSTGRES_READER_USER: hs_reader
      POSTGRES_READER_PASSWORD: hs_reader
      POSTGRES_WRITER_USER: hs_writer
      POSTGRES_WRITER_PASSWORD: hs_writer
      POSTGRES_POOL_MIN_SIZE: 2
      POSTGRES_POOL_MAX_SIZE: 5
    ports:
      - "8004:8004"
      - "5682:5678"  # debugpy
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - healthcare-service-network

  patient-summary:
    build:
      context: .
      dockerfile: services/patient-summary/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      INCLUDE_DEBUG: debugpy
      NATS_URL: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthcare
      POSTGRES_READER_USER: hs_reader
      POSTGRES_READER_PASSWORD: hs_reader
      POSTGRES_WRITER_USER: hs_writer
      POSTGRES_WRITER_PASSWORD: hs_writer
      POSTGRES_POOL_MIN_SIZE: 2
      POSTGRES_POOL_MAX_SIZE: 5
      PATIENT_DATA_URL: http://patient-data:8002
      TIMELINE_URL: http://patient-timeline:8004
      AGENT_URL: "http://host.docker.internal:11434"
      LLM_MODEL: "mistral:latest"
    ports:
      - "8005:8005"
      - "5683:5678"  # debugpy
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      patient-data:
        condition: service_started
      patient-timeline:
        condition: service_started
    networks:
      - healthcare-service-network

  patient-api:
    build:
      context: .
      dockerfile: services/patient-api/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      PATIENT_DATA_URL: http://patient-data:8002
      RECONCILIATION_URL: http://patient-event-reconciliation:8003
      TIMELINE_URL: http://patient-timeline:8004
      PATIENT_SUMMARY_URL: http://patient-summary:8005
    ports:
      - "8000:8000"
      - "5678:5678"  # debugpy
    depends_on:
      - patient-data
      - patient-event-reconciliation
      - patient-timeline
      - patient-summary
    networks:
      - healthcare-service-network

  notification:
    build:
      context: .
      dockerfile: services/notification/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      NATS_URL: nats://nats:4222
    ports:
      - "8006:8006"
      - "5684:5678"  # debugpy
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - healthcare-service-network

  patient-reconciliation-worker:
    build:
      context: .
      dockerfile: services/patient-reconciliation-worker/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
    environment:
      INCLUDE_DEBUG: debugpy
      WORKER_ID: patient-reconciliation-worker-1
      NATS_URL: nats://nats:4222
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthcare
      POSTGRES_READER_USER: hs_reader
      POSTGRES_READER_PASSWORD: hs_reader
      POSTGRES_WRITER_USER: hs_writer
      POSTGRES_WRITER_PASSWORD: hs_writer
      POSTGRES_POOL_MIN_SIZE: 2
      POSTGRES_POOL_MAX_SIZE: 5
    ports:
      - "8008:8008"
      - "5686:5678"  # debugpy
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - healthcare-service-network

  npi-registry:
    build:
      context: .
      dockerfile: services/npi-registry/infra/Dockerfile
      args:
        INCLUDE_DEBUG: debugpy
        APP_PORT: 8007
    container_name: npi-registry
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthcare
      POSTGRES_READER_USER: hs_reader
      POSTGRES_READER_PASSWORD: hs_reader
      POSTGRES_WRITER_USER: hs_writer
      POSTGRES_WRITER_PASSWORD: hs_writer
      POSTGRES_POOL_MIN_SIZE: 2
      POSTGRES_POOL_MAX_SIZE: 5
      LOG_CONFIG: shared/custom-logging.yaml
    ports:
      - "8007:8007"
      - "5685:5678"  # debugpy
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-service-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  healthcare_postgres_data:

networks:
  healthcare-service-network:
    driver: bridge
